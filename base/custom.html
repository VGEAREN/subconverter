<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SubConverter - 订阅转换配置</title>
<style>
:root {
  --bg: #f5f7fa;
  --card: #fff;
  --border: #e0e4e8;
  --primary: #4f8cff;
  --primary-hover: #3a6fd8;
  --danger: #e74c3c;
  --text: #2c3e50;
  --text-secondary: #7f8c8d;
  --success: #27ae60;
  --radius: 8px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--bg); color: var(--text); line-height: 1.6; padding: 20px; }
.container { max-width: 900px; margin: 0 auto; }
h1 { text-align: center; margin-bottom: 24px; font-size: 24px; }
.card { background: var(--card); border-radius: var(--radius); padding: 24px; margin-bottom: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
.card h2 { font-size: 16px; margin-bottom: 16px; padding-bottom: 8px; border-bottom: 1px solid var(--border); }
.form-group { margin-bottom: 14px; display: flex; align-items: flex-start; gap: 12px; }
.form-group label { min-width: 100px; padding-top: 6px; font-size: 14px; color: var(--text-secondary); text-align: right; flex-shrink: 0; }
.form-group input[type="text"], .form-group input[type="number"], .form-group select, .form-group textarea {
  flex: 1; padding: 8px 12px; border: 1px solid var(--border); border-radius: 6px; font-size: 14px; transition: border-color .2s;
}
.form-group input:focus, .form-group select:focus, .form-group textarea:focus { outline: none; border-color: var(--primary); }
.form-group textarea { resize: vertical; min-height: 70px; font-family: monospace; }
.toggle-row { display: flex; flex-wrap: wrap; gap: 16px; flex: 1; padding-top: 4px; }
.toggle-item { display: flex; align-items: center; gap: 6px; font-size: 14px; }
.toggle-item select { padding: 4px 8px; border: 1px solid var(--border); border-radius: 4px; font-size: 13px; }
.btn-row { display: flex; gap: 10px; justify-content: flex-end; margin-top: 16px; }
.btn { padding: 8px 20px; border: none; border-radius: 6px; font-size: 14px; cursor: pointer; transition: all .2s; }
.btn-primary { background: var(--primary); color: #fff; }
.btn-primary:hover { background: var(--primary-hover); }
.btn-danger { background: var(--danger); color: #fff; }
.btn-danger:hover { opacity: .85; }
.btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text); }
.btn-outline:hover { border-color: var(--primary); color: var(--primary); }
.config-list { list-style: none; }
.config-item { display: flex; align-items: center; justify-content: space-between; padding: 10px 14px; border: 1px solid var(--border); border-radius: 6px; margin-bottom: 8px; }
.config-item .name { font-weight: 500; font-size: 14px; }
.config-item .meta { font-size: 12px; color: var(--text-secondary); }
.config-item .actions { display: flex; gap: 8px; }
.config-item .actions .btn { padding: 4px 12px; font-size: 12px; }
.link-box { display: flex; gap: 8px; align-items: center; margin-top: 12px; }
.link-box input { flex: 1; padding: 8px 12px; border: 1px solid var(--border); border-radius: 6px; font-size: 13px; font-family: monospace; background: #f8f9fa; }
.toast { position: fixed; top: 20px; right: 20px; padding: 12px 20px; border-radius: 6px; color: #fff; font-size: 14px; z-index: 999; opacity: 0; transition: opacity .3s; }
.toast.show { opacity: 1; }
.toast.success { background: var(--success); }
.toast.error { background: var(--danger); }
.empty { text-align: center; color: var(--text-secondary); padding: 20px; font-size: 14px; }
.test-item { display: flex; align-items: center; gap: 8px; padding: 6px 10px; border-radius: 4px; font-size: 13px; margin-bottom: 4px; font-family: monospace; word-break: break-all; }
.test-item.ok { background: #eafaf1; color: var(--success); }
.test-item.fail { background: #fdedec; color: var(--danger); }
.test-item.loading { background: #f0f4ff; color: var(--primary); }
.test-item .badge { font-size: 11px; padding: 2px 6px; border-radius: 3px; background: rgba(0,0,0,0.08); white-space: nowrap; }
.tip { display: inline-block; width: 16px; height: 16px; line-height: 16px; text-align: center; border-radius: 50%; background: var(--border); color: var(--text-secondary); font-size: 11px; cursor: help; position: relative; flex-shrink: 0; }
.tip:hover::after { content: attr(data-tip); position: absolute; left: 24px; top: 50%; transform: translateY(-50%); background: var(--text); color: #fff; padding: 6px 10px; border-radius: 4px; font-size: 12px; white-space: nowrap; z-index: 10; pointer-events: none; }
</style>
</head>
<body>
<div class="container">
  <h1>SubConverter 订阅转换配置</h1>

  <div class="card">
    <h2 id="form-title">新建配置</h2>
    <div class="form-group">
      <label>配置 ID</label>
      <input type="text" id="cfg-id" placeholder="自定义 ID（英文/数字），保存后不可修改">
    </div>

    <div class="form-group">
      <label>配置名称</label>
      <input type="text" id="cfg-name" placeholder="为这个配置起个名字">
    </div>

    <div class="form-group">
      <label>目标格式</label>
      <select id="cfg-target">
        <option value="clash">Clash</option>
        <option value="clashr">ClashR</option>
        <option value="surge&ver=4">Surge 4</option>
        <option value="surge&ver=3">Surge 3</option>
        <option value="surge&ver=2">Surge 2</option>
        <option value="quanx">Quantumult X</option>
        <option value="quan">Quantumult</option>
        <option value="loon">Loon</option>
        <option value="surfboard">Surfboard</option>
        <option value="singbox">sing-box</option>
        <option value="ss">SS (SIP002)</option>
        <option value="ssr">SSR</option>
        <option value="sssub">SS Android</option>
        <option value="v2ray">V2Ray</option>
        <option value="trojan">Trojan</option>
        <option value="mixed">Mixed</option>
      </select>
    </div>

    <div class="form-group">
      <label>订阅链接</label>
      <div style="flex:1;display:flex;flex-direction:column;gap:8px;">
        <textarea id="cfg-url" placeholder="每行一个订阅链接，多个链接会自动合并" style="min-height:100px;flex-shrink:0;"></textarea>
        <div style="display:flex;gap:8px;align-items:center;">
          <button class="btn btn-outline" onclick="testUrls()" id="btn-test">测试订阅链接</button>
          <span id="test-status" style="font-size:13px;color:var(--text-secondary);"></span>
        </div>
        <div id="test-results"></div>
      </div>
    </div>

    <div class="form-group">
      <label>缓存刷新 <span class="tip" data-tip="后台定时拉取订阅并更新本地缓存，失败时保留旧数据">?</span></label>
      <input type="number" id="cfg-refresh_interval" placeholder="分钟，默认 360（6小时），0 为不自动刷新">
    </div>

    <div class="form-group">
      <label>包含节点 <span class="tip" data-tip="只保留匹配的节点，支持正则表达式">?</span></label>
      <input type="text" id="cfg-include" placeholder="正则表达式，如 港|HK|Hong">
    </div>

    <div class="form-group">
      <label>排除节点 <span class="tip" data-tip="移除匹配的节点，支持正则表达式">?</span></label>
      <input type="text" id="cfg-exclude" placeholder="正则表达式，如 到期|剩余|流量">
    </div>

    <div class="form-group">
      <label>节点重命名 <span class="tip" data-tip="替换节点名称中的关键词，多个规则用 ` 分隔">?</span></label>
      <input type="text" id="cfg-rename" placeholder="格式: 旧名@新名 多个用 ` 分隔">
    </div>

    <div class="form-group">
      <label>输出文件名 <span class="tip" data-tip="客户端下载时的文件名">?</span></label>
      <input type="text" id="cfg-filename" placeholder="如 config.yaml">
    </div>

    <div class="form-group">
      <label>更新间隔 <span class="tip" data-tip="写入配置文件，告诉客户端多久自动拉取一次订阅">?</span></label>
      <input type="number" id="cfg-interval" placeholder="秒，如 86400">
    </div>

    <div class="form-group">
      <label>开关选项</label>
      <div class="toggle-row">
        <div class="toggle-item">
          <span>Emoji</span><span class="tip" data-tip="在节点名称前添加国旗 emoji，如 🇭🇰 香港">?</span>
          <select id="cfg-emoji"><option value="">默认</option><option value="true">开</option><option value="false">关</option></select>
        </div>
        <div class="toggle-item">
          <span>UDP</span><span class="tip" data-tip="强制开启或关闭节点的 UDP 转发支持">?</span>
          <select id="cfg-udp"><option value="">默认</option><option value="true">开</option><option value="false">关</option></select>
        </div>
        <div class="toggle-item">
          <span>TFO</span><span class="tip" data-tip="TCP Fast Open，减少连接握手延迟">?</span>
          <select id="cfg-tfo"><option value="">默认</option><option value="true">开</option><option value="false">关</option></select>
        </div>
        <div class="toggle-item">
          <span>排序</span><span class="tip" data-tip="按节点名称对所有节点排序">?</span>
          <select id="cfg-sort"><option value="">默认</option><option value="true">开</option><option value="false">关</option></select>
        </div>
        <div class="toggle-item">
          <span>跳过证书验证</span><span class="tip" data-tip="跳过 TLS 证书验证，用于自签名证书的节点">?</span>
          <select id="cfg-scv"><option value="">默认</option><option value="true">开</option><option value="false">关</option></select>
        </div>
        <div class="toggle-item">
          <span>过滤废弃节点</span><span class="tip" data-tip="移除不再支持的旧协议节点">?</span>
          <select id="cfg-fdn"><option value="">默认</option><option value="true">开</option><option value="false">关</option></select>
        </div>
        <div class="toggle-item">
          <span>TLS 1.3</span><span class="tip" data-tip="强制开启 TLS 1.3 加密协议">?</span>
          <select id="cfg-tls13"><option value="">默认</option><option value="true">开</option><option value="false">关</option></select>
        </div>
        <div class="toggle-item">
          <span>追加节点类型</span><span class="tip" data-tip="在节点名称后追加协议标识，如 [SS]、[VMess]">?</span>
          <select id="cfg-append_type"><option value="">默认</option><option value="true">开</option><option value="false">关</option></select>
        </div>
        <div class="toggle-item">
          <span>展开规则集</span><span class="tip" data-tip="将 rule-provider 展开为内联规则，无需客户端远程加载">?</span>
          <select id="cfg-expand"><option value="">默认</option><option value="true">开</option><option value="false">关</option></select>
        </div>
      </div>
    </div>

    <div class="btn-row">
      <button class="btn btn-outline" onclick="resetForm()">重置</button>
      <button class="btn btn-primary" onclick="saveConfig()">保存配置</button>
    </div>
  </div>

  <div class="card">
    <h2>已保存配置</h2>
    <ul class="config-list" id="config-list">
      <li class="empty">暂无保存的配置</li>
    </ul>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const BASE = window.location.origin;
let PWD = new URLSearchParams(window.location.search).get('password') || new URLSearchParams(window.location.search).get('pwd') || localStorage.getItem('custom_pwd') || '';
function api(path) { return BASE + path + (path.includes('?') ? '&' : '?') + 'password=' + encodeURIComponent(PWD); }

async function checkAuth() {
  const resp = await fetch(api('/api/custom/list'));
  if (resp.status === 401) {
    const input = prompt('请输入管理密码:');
    if (!input) { document.body.innerHTML = '<h2 style="text-align:center;margin-top:100px;color:#999;">需要密码才能访问</h2>'; return; }
    PWD = input;
    localStorage.setItem('custom_pwd', PWD);
    const retry = await fetch(api('/api/custom/list'));
    if (retry.status === 401) { localStorage.removeItem('custom_pwd'); alert('密码错误'); location.reload(); return; }
  }
  loadList();
}

const FIELDS = [
  {id: 'cfg-id', key: 'id'},
  {id: 'cfg-name', key: 'name'},
  {id: 'cfg-target', key: 'target'},
  {id: 'cfg-url', key: 'url', type: 'textarea'},
  {id: 'cfg-refresh_interval', key: 'refresh_interval'},
  {id: 'cfg-include', key: 'include'},
  {id: 'cfg-exclude', key: 'exclude'},
  {id: 'cfg-rename', key: 'rename'},
  {id: 'cfg-filename', key: 'filename'},
  {id: 'cfg-interval', key: 'interval'},
  {id: 'cfg-emoji', key: 'emoji'},
  {id: 'cfg-udp', key: 'udp'},
  {id: 'cfg-tfo', key: 'tfo'},
  {id: 'cfg-sort', key: 'sort'},
  {id: 'cfg-scv', key: 'scv'},
  {id: 'cfg-fdn', key: 'fdn'},
  {id: 'cfg-tls13', key: 'tls13'},
  {id: 'cfg-append_type', key: 'append_type'},
  {id: 'cfg-expand', key: 'expand'},
];

function toast(msg, type) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'toast show ' + type;
  setTimeout(() => el.className = 'toast', 2500);
}

function getFormData() {
  const data = {};
  FIELDS.forEach(f => {
    const el = document.getElementById(f.id);
    const val = el.value.trim();
    if (val) data[f.key] = val;
  });
  // Handle multi-line URLs: join with |
  if (data.url) {
    data.url = data.url.split('\n').map(s => s.trim()).filter(Boolean).join('|');
  }
  // Ensure refresh_interval is stored as a number
  if (data.refresh_interval) {
    data.refresh_interval = parseInt(data.refresh_interval, 10) || 0;
  }
  // Handle target with ver (e.g. "surge&ver=4")
  if (data.target && data.target.includes('&ver=')) {
    const parts = data.target.split('&ver=');
    data.target = parts[0];
    data.ver = parts[1];
  }
  return data;
}

function setFormData(data) {
  resetForm();
  let target = data.target || 'clash';
  if (data.ver) target += '&ver=' + data.ver;
  document.getElementById('cfg-target').value = target;

  FIELDS.forEach(f => {
    if (f.key === 'target') return;
    const el = document.getElementById(f.id);
    const val = data[f.key] || '';
    if (f.key === 'url') {
      el.value = val.split('|').join('\n');
    } else {
      el.value = val;
    }
  });

}

function resetForm() {
  document.getElementById('form-title').textContent = '新建配置';
  FIELDS.forEach(f => document.getElementById(f.id).value = '');
  document.getElementById('cfg-id').readOnly = false;
  document.getElementById('cfg-target').value = 'clash';
}

async function saveConfig() {
  const data = getFormData();
  if (!data.id) { toast('请输入配置 ID', 'error'); return; }
  if (!/^[a-zA-Z0-9_-]+$/.test(data.id)) { toast('ID 只能包含英文、数字、下划线和短横线', 'error'); return; }
  if (!data.url) { toast('请输入订阅链接', 'error'); return; }
  if (!data.target) { toast('请选择目标格式', 'error'); return; }

  try {
    const resp = await fetch(api('/api/custom/save'), {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify(data)
    });
    const result = await resp.json();
    if (result.ok) {
      toast('保存成功', 'success');
      resetForm();
      loadList();
    } else {
      toast(result.error || '保存失败', 'error');
    }
  } catch(e) {
    toast('请求失败: ' + e.message, 'error');
  }
}

async function loadList() {
  try {
    const resp = await fetch(api('/api/custom/list'));
    const list = await resp.json();
    const ul = document.getElementById('config-list');
    if (!list.length) {
      ul.innerHTML = '<li class="empty">暂无保存的配置</li>';
      return;
    }
    ul.innerHTML = list.map(item => {
      const link = BASE + '/custom?id=' + item.id;
      const targetLabel = item.target + (item.ver ? ' v' + item.ver : '');
      return `<li class="config-item">
        <div>
          <div class="name">${esc(item.name || item.id)}</div>
          <div class="meta">目标: ${esc(targetLabel)}</div>
          <div class="link-box">
            <input type="text" value="${esc(link)}" readonly onclick="this.select()">
            <button class="btn btn-outline" onclick="copyLink('${esc(link)}')">复制</button>
          </div>
        </div>
        <div class="actions">
          <button class="btn btn-outline" onclick="editConfig('${item.id}')">编辑</button>
          <button class="btn btn-danger" onclick="deleteConfig('${item.id}')">删除</button>
        </div>
      </li>`;
    }).join('');
  } catch(e) {
    toast('加载列表失败', 'error');
  }
}

async function editConfig(id) {
  try {
    const resp = await fetch(api('/api/custom/get?id=' + id));
    const data = await resp.json();
    if (data.error) { toast(data.error, 'error'); return; }
    setFormData(data);
    document.getElementById('cfg-id').readOnly = true;
    document.getElementById('form-title').textContent = '编辑配置: ' + (data.name || id);
    window.scrollTo({top: 0, behavior: 'smooth'});
    // Load cache info for each URL
    const urlStr = data.url || '';
    if (urlStr) {
      const urls = urlStr.split('|').map(s => s.trim()).filter(Boolean);
      const container = document.getElementById('test-results');
      container.innerHTML = urls.map((url, i) =>
        `<div class="test-item loading" id="test-${i}">&#8987; ${esc(url.length > 60 ? url.substring(0, 60) + '...' : url)}</div>`
      ).join('');
      urls.forEach(async (url, i) => {
        const el = document.getElementById('test-' + i);
        try {
          const r = await fetch(api('/api/custom/cache_info?url=' + encodeURIComponent(url)));
          const d = await r.json();
          if (d.ok && d.cached) {
            el.className = 'test-item ok';
            const updatedAt = d.updated_at ? new Date(d.updated_at * 1000).toLocaleString('zh-CN') : '';
            el.innerHTML = `&#10004; ${esc(url.length > 50 ? url.substring(0, 50) + '...' : url)} <span class="badge">${d.nodes} 个节点（已缓存）</span>${updatedAt ? ` <span class="badge" style="background:rgba(23,162,184,0.12);color:#17a2b8">${updatedAt} 更新</span>` : ''}`;
          } else {
            el.className = 'test-item fail';
            el.innerHTML = `&#10008; ${esc(url.length > 50 ? url.substring(0, 50) + '...' : url)} <span class="badge">未缓存</span>`;
          }
        } catch(e) {
          el.className = 'test-item fail';
          el.innerHTML = `&#10008; ${esc(url.length > 50 ? url.substring(0, 50) + '...' : url)} <span class="badge">查询失败</span>`;
        }
      });
    }
  } catch(e) {
    toast('加载配置失败', 'error');
  }
}

async function deleteConfig(id) {
  if (!confirm('确定要删除这个配置吗？')) return;
  try {
    const resp = await fetch(api('/api/custom/delete?id=' + id), {method: 'DELETE'});
    const result = await resp.json();
    if (result.ok) {
      toast('已删除', 'success');
      loadList();
    } else {
      toast(result.error || '删除失败', 'error');
    }
  } catch(e) {
    toast('请求失败', 'error');
  }
}

async function testUrls() {
  const text = document.getElementById('cfg-url').value.trim();
  if (!text) { toast('请先输入订阅链接', 'error'); return; }
  const urls = text.split('\n').map(s => s.trim()).filter(Boolean);
  const container = document.getElementById('test-results');
  const btn = document.getElementById('btn-test');
  const status = document.getElementById('test-status');
  btn.disabled = true;
  btn.textContent = '测试中...';
  status.textContent = '';
  container.innerHTML = urls.map((url, i) =>
    `<div class="test-item loading" id="test-${i}">&#8987; ${esc(url.length > 60 ? url.substring(0, 60) + '...' : url)}</div>`
  ).join('');

  let okCount = 0, failCount = 0;
  const promises = urls.map(async (url, i) => {
    const el = document.getElementById('test-' + i);
    try {
      const resp = await fetch(api('/api/custom/test?url=' + encodeURIComponent(url)));
      const data = await resp.json();
      if (data.ok) {
        el.className = 'test-item ok';
        el.innerHTML = `&#10004; ${esc(url.length > 50 ? url.substring(0, 50) + '...' : url)} <span class="badge">${data.nodes} 个节点</span>`;
        okCount++;
      } else {
        el.className = 'test-item fail';
        el.innerHTML = `&#10008; ${esc(url.length > 50 ? url.substring(0, 50) + '...' : url)} <span class="badge">${data.error || '无有效节点'}</span>`;
        failCount++;
      }
    } catch(e) {
      el.className = 'test-item fail';
      el.innerHTML = `&#10008; ${esc(url.length > 50 ? url.substring(0, 50) + '...' : url)} <span class="badge">请求失败</span>`;
      failCount++;
    }
  });
  await Promise.all(promises);
  btn.disabled = false;
  btn.textContent = '测试订阅链接';
  status.textContent = `测试完成: ${okCount} 成功, ${failCount} 失败`;
  status.style.color = failCount > 0 ? 'var(--danger)' : 'var(--success)';
}

function copyLink(link) {
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(link).then(() => toast('已复制到剪贴板', 'success')).catch(() => toast('复制失败', 'error'));
  } else {
    const ta = document.createElement('textarea');
    ta.value = link;
    ta.style.position = 'fixed';
    ta.style.opacity = '0';
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    toast('已复制到剪贴板', 'success');
  }
}

function esc(s) {
